name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    # This ensures the runner operates INSIDE your custom container
    # Container now runs as UID 1001 by default, matching GitHub Actions
    container:
      image: ghcr.io/kaladron/cpp-image/dev-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      # No need for --user root anymore!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: If you baked all dependencies into the container (recommended),
      # you can delete this entire step. Otherwise, add 'sudo' before commands:
      - name: Install dependencies
        run: |
          # Only needed if dependencies aren't in container
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
          # Create symlinks (these should ideally be in the container)
          sudo ln -sf /usr/bin/ld.lld-22 /usr/bin/ld.lld
          sudo ln -sf /usr/bin/lld-22 /usr/bin/lld
          sudo ln -sf /usr/bin/clang-scan-deps-22 /usr/bin/clang-scan-deps
          sudo ln -sf /usr/bin/clang-format-22 /usr/bin/clang-format
          sudo mkdir -p /lib/share/libc++
          sudo ln -sf /usr/lib/llvm-22/share/libc++/v1 /lib/share/libc++/v1

      - name: Configure CMake
        run: cmake -S . -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-22

      - name: Check code formatting
        run: |
          ninja -C build format
          if ! git diff --quiet; then
            echo "❌ Code formatting issues detected!"
            echo ""
            echo "To fix formatting, run:"
            echo "  ninja -C build format-fix"
            echo ""
            echo "Files that need formatting:"
            git diff --name-only
            echo ""
            echo "💡 Tip: Install pre-commit hooks to catch this locally:"
            echo "  ./tools/install-hooks.sh"
            exit 1
          fi
          echo "✅ Code formatting is correct"

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
