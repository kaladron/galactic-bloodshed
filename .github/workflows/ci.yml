name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    
    # This ensures the runner operates INSIDE your custom container
    container:
      image: ghcr.io/kaladron/cpp-image/dev-env:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libsqlite3-dev
          # Create symlinks for lld linker (lld-22 -> lld)
          ln -sf /usr/bin/ld.lld-22 /usr/bin/ld.lld
          ln -sf /usr/bin/lld-22 /usr/bin/lld
          # Update clang-scan-deps to use version 22 (matches clang++ 22 and libc++ 22)
          ln -sf /usr/bin/clang-scan-deps-22 /usr/bin/clang-scan-deps
          # Create symlink for clang-format (needed for format check)
          ln -sf /usr/bin/clang-format-22 /usr/bin/clang-format
          # Create symlink for C++ standard library modules (entire directory)
          mkdir -p /lib/share/libc++
          ln -sf /usr/lib/llvm-22/share/libc++/v1 /lib/share/libc++/v1

      - name: Check readonly iterator usage
        run: |
          if find gb -type f \( -name '*.cc' -o -name '*.cppm' -o -name '*.h' \) \
            -exec grep -nHE 'const (RaceList|StarList|PlanetList|CommodList)\b' {} +; then
            echo "❌ Read-only entity iteration should use XxxList::readonly(...), not const XxxList."
            echo ""
            echo "Update the matching loops to use one of:"
            echo "  RaceList::readonly(em)"
            echo "  StarList::readonly(em)"
            echo "  PlanetList::readonly(em, star_id, star)"
            echo "  CommodList::readonly(em)"
            exit 1
          fi
          echo "✅ Read-only entity list usage is correct"

      - name: Configure CMake
        # We can use the environment variables set in your Dockerfile
        # Use clang++-22 to match the libc++-22 libraries
        run: cmake -S . -G Ninja -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++-22

      - name: Check code formatting
        run: |
          ninja -C build format
          if ! git diff --quiet; then
            echo "❌ Code formatting issues detected!"
            echo ""
            echo "To fix formatting, run:"
            echo "  ninja -C build format-fix"
            echo ""
            echo "Files that need formatting:"
            git diff --name-only
            echo ""
            echo "💡 Tip: Install pre-commit hooks to catch this locally:"
            echo "  ./tools/install-hooks.sh"
            exit 1
          fi
          echo "✅ Code formatting is correct"

      - name: Build
        run: cmake --build build

      - name: Test
        working-directory: build
        run: ctest --output-on-failure
